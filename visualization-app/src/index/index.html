<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <!-- Include the CesiumJS JavaScript and CSS files -->
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.137/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.137/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
</head>
<body>
  <div id="cesiumContainer"></div>

  <div id="timeBox">
    <div><strong>🌍 Terre (UTC)</strong></div>
    <div id="earthTime">--:--:--</div>

    <hr>

    <div><strong>🌙 Lune (temps moyen)</strong></div>
    <div id="moonTime">--:--:--</div>
  </div>


</div>






<!-- bouton flottant -->
<button id="panelToggle">☰</button>

<!-- panneau -->
<div id="sidePanel" class="open">
  <h3>Contrôles</h3>

  <!-- Section 1 -->
  <details open>
    <summary>🌙 Surface</summary>
    <label>
      <input type="checkbox" id="toggleTileset" checked>
      Tileset lunaire
    </label>
  </details>

  <!-- Section 2 -->
  <details>
    <summary>🛰️ Orbites</summary>
    <label><input type="checkbox" id="toggleOrbits" checked> Orbites</label>
    <label><input type="checkbox" id="toggleLinks"> Liens</label>
  </details>

  <!-- Section 3 -->
  <details>
    <summary>⏱️ Temps</summary>
    <label><input type="checkbox" id="toggleTimeBox" checked> Boîte temps</label>
  </details>
</div>




</body>
</html>
